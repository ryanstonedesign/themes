<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Themes - Ryan Stone Design</title>
    <meta name="description" content="A tactile design instrument for remixing cohesive visual systems." />
    <meta name="theme-color" content="#eaeaf0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" id="font-link" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@400;700&display=swap" />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <div class="bg-orb bg-orb--a"></div>
      <div class="bg-orb bg-orb--b"></div>
      <div class="bg-orb bg-orb--c"></div>
      <div class="bg-orb bg-orb--d"></div>
      <div class="bg-grain"></div>
    </div>

    <main class="stage" id="stage">
      <!-- Top mode segmented control -->
      <nav class="segmented segmented--top" role="tablist" aria-label="Mode">
        <button class="seg-btn is-active" role="tab" aria-selected="true" data-mode="create">Create</button>
        <button class="seg-btn" role="tab" aria-selected="false" data-mode="saved">
          Saved <span class="seg-count" id="savedCount" hidden>0</span>
        </button>
        <span class="seg-pill" aria-hidden="true"></span>
      </nav>

      <!-- Create view -->
      <section class="view view--create" id="createView">
        <article class="card" id="card" aria-label="Generated theme preview">
          <div class="card-noise" aria-hidden="true"></div>

          <header class="card-actions">
            <button class="ctrl ctrl--icon" id="shareBtn" aria-label="Share theme" title="Share">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 3v13"></path>
                <path d="m7 8 5-5 5 5"></path>
                <path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"></path>
              </svg>
            </button>
            <button class="ctrl ctrl--icon" id="starBtn" aria-label="Save theme" title="Save">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" id="starIcon">
                <path d="m12 3 2.9 6.3 6.6.6-5 4.6 1.5 6.5L12 17.8 6 21l1.5-6.5-5-4.6 6.6-.6L12 3Z"></path>
              </svg>
            </button>
          </header>

          <div class="card-body">
            <section class="type-pair" aria-label="Typography">
              <h2 class="type-sample type-sample--sans" id="headline">Hello world</h2>
              <h3 class="type-sample type-sample--serif" id="subhead">Inter</h3>
            </section>

            <section class="swatch-grid" aria-label="Colors">
              <div class="swatch" data-role="palette" data-i="0"><span class="swatch-hex"></span></div>
              <div class="swatch" data-role="palette" data-i="1"><span class="swatch-hex"></span></div>
              <div class="swatch" data-role="palette" data-i="2"><span class="swatch-hex"></span></div>
              <div class="swatch" data-role="gray" data-i="0"><span class="swatch-hex"></span></div>
              <div class="swatch" data-role="gray" data-i="1"><span class="swatch-hex"></span></div>
              <div class="swatch" data-role="gray" data-i="2"><span class="swatch-hex"></span></div>
            </section>

            <section class="btn-stack" aria-label="Button preview">
              <button class="pv pv--primary" type="button"><span>Primary action</span></button>
              <button class="pv pv--secondary" type="button"><span>Secondary</span></button>
              <button class="pv pv--tertiary" type="button"><span>Tertiary</span></button>
            </section>
          </div>
        </article>
      </section>

      <!-- Saved view -->
      <section class="view view--saved" id="savedView" hidden>
        <div class="snap-stack" id="snapStack"></div>
        <div class="saved-empty" id="savedEmpty" hidden>
          <p>No saved themes</p>

        </div>
      </section>

      <button class="ctrl ctrl--icon saved-edit-btn" id="savedEditBtn" hidden aria-label="Edit saved theme" title="Edit">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m16.5 3.5 4 4L8 20l-5 1 1-5 12.5-12.5Z"/></svg>
      </button>

      <!-- Bottom control bar -->
      <div class="controls" id="controls">
        <nav class="segmented segmented--scope" role="tablist" aria-label="Regeneration scope">
          <button class="seg-btn seg-btn--stack is-active" data-scope="all" aria-selected="true">
            <svg class="seg-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
            <span class="seg-label">All</span>
          </button>
          <button class="seg-btn seg-btn--stack" data-scope="font" aria-selected="false">
            <span class="seg-icon seg-icon--type" aria-hidden="true">Aa</span>
            <span class="seg-label">Font</span>
          </button>
          <button class="seg-btn seg-btn--stack" data-scope="colors" aria-selected="false">
            <svg class="seg-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22a10 10 0 1 1 10-10c0 2.4-2 3.5-4 3.5h-2a2 2 0 0 0-1.4 3.4A2 2 0 0 1 12 22Z"/><circle cx="6.5" cy="12.5" r="1"/><circle cx="9" cy="7.5" r="1"/><circle cx="14.5" cy="6.5" r="1"/><circle cx="18" cy="11" r="1"/></svg>
            <span class="seg-label">Colors</span>
          </button>
          <button class="seg-btn seg-btn--stack" data-scope="buttons" aria-selected="false">
            <svg class="seg-icon" width="20" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="8" width="18" height="9" rx="4.5"/></svg>
            <span class="seg-label">Buttons</span>
          </button>
          <button class="seg-btn seg-btn--stack" data-scope="page" aria-selected="false">
            <svg class="seg-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M4 15h16"/><path d="M15 4v16"/></svg>
            <span class="seg-label">Page</span>
          </button>
          <span class="seg-pill" aria-hidden="true"></span>
        </nav>
        <button class="ctrl ctrl--icon ctrl--regen" id="regenBtn" aria-label="Regenerate" title="Regenerate">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 12a9 9 0 0 1 15.5-6.3L21 8"/>
            <path d="M21 3v5h-5"/>
            <path d="M21 12a9 9 0 0 1-15.5 6.3L3 16"/>
            <path d="M3 21v-5h5"/>
          </svg>
        </button>
      </div>
    </main>

    <!-- Share popover -->
    <div class="share-popover" id="shareSheet" hidden>
      <button class="share-popover-row" data-export="image">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>
        <span>PNG</span>
      </button>
      <button class="share-popover-row" data-export="css">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        <span>DESIGN.md</span>
      </button>
      <button class="share-popover-row" data-export="clipboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>
        <span>Clipboard</span>
      </button>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true">Copied</div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
